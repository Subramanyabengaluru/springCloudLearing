server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Anything starting with /api/posts goes to post-service.
        # lb:// means "look this name up in Eureka and load-balance across instances".
        - id: post-service
          uri: lb://post-service
          predicates:
            - Path=/api/posts/**

        # Anything starting with /api/comments goes to comment-service
        - id: comment-service
          uri: lb://comment-service
          predicates:
            - Path=/api/comments/**

# Register the gateway with Eureka so it can discover the other services
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

# Helpful logs so you can see how the gateway routes each request
logging:
  level:
    org.springframework.cloud.gateway: INFO
