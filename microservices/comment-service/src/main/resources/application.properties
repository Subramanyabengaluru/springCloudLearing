spring.application.name=comment-service

# ===== Own database: comments_db =====
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:comments_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:miniblog}
spring.datasource.password=${DB_PASSWORD:miniblog}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== This service runs on 8082 =====
server.port=8082

# ===== URL of post-service =====
# Now a Eureka SERVICE NAME (resolved by the load balancer), not host:port.
post-service.url=${POST_SERVICE_URL:http://post-service}

# ===== Register with Eureka service discovery =====
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
